<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Parrotix</title>
    <script type="text/javascript">
      // SPA fallback for GitHub Pages.
      // GitHub Pages doesn't know about client-side routes, so any direct
      // visit / hard refresh on /privacy, /terms, /refund hits this 404 page.
      // We rewrite the URL into a single-segment with the original path
      // encoded as a query string, then index.html's loader-script decodes it
      // back before React Router sees the request.
      // Reference: https://github.com/rafgraph/spa-github-pages (MIT)
      // Custom domain (parrotix.com) = serve from root → pathSegmentsToKeep = 0
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
