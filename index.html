    <script type="text/javascript">
      // SPA path decoder — pairs with public/404.html.
      // When 404.html redirects /privacy → /?/privacy, this restores the
      // original URL via history.replaceState before React Router mounts,
      // so refresh / direct navigation on deep links works seamlessly.
      // Reference: https://github.com/rafgraph/spa-github-pages (MIT)
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
